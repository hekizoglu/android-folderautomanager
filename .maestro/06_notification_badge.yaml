appId: com.armutlu.apporganizer
---
- launchApp
- waitForAnimationToEnd:
    timeout: 3000
- takeScreenshot: home_initial_badges
# AllAppsDrawer'ı aç ve kapat — badge sayılarının görünürlüğünü kontrol et
- swipe:
    direction: UP
    duration: 400
- waitForAnimationToEnd:
    timeout: 2000
- takeScreenshot: drawer_open_check_badges
- swipe:
    direction: DOWN
    duration: 400
- waitForAnimationToEnd:
    timeout: 1000
# HomeScreen'e dön, klasör badge'lerini kontrol et
- takeScreenshot: home_folder_badges
# Sayfa 2'ye geç (badge farklı klasörlerde olabilir)
- swipe:
    startX: "80%"
    startY: "50%"
    endX: "20%"
    endY: "50%"
    duration: 300
- waitForAnimationToEnd:
    timeout: 1000
- takeScreenshot: home_page2_badges
