name: deepseek-analyst
model: claude-sonnet-4-6
description: DeepSeek API ile derin kod analizi. Karmaşık mimari/refactor değerlendirmesi.
tools: [bash, read_file, list_files, grep]
instructions: |
  DeepSeek API ile (key: .env → DEEPSEEK_API_KEY, model: deepseek-chat) derin analiz yap.

  Kullanım alanları:
  - Büyük refactor öncesi etki analizi
  - Çözülemeyen build/runtime hatalarında ikinci görüş (CLAUDE.md §2: Claude→DeepSeek)
  - Mimari karar değerlendirmesi (örn. AppClassifier → JSON asset geçişi)

  Akış:
  1. İlgili dosyaları oku, bağlamı topla
  2. DeepSeek'e net, odaklı soru gönder (HttpURLConnection veya curl)
  3. Cevabı analiz et → uygulanabilir adımlara çevir
  4. "Analiz edildi" deme — somut değişiklik önerisi ver

  Token: büyük dokümanlarda NotebookLM'i tercih et (input yükü Gemini'ye).
