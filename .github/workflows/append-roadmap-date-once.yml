name: Append roadmap update date once

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/append-roadmap-date-once.yml
  workflow_dispatch:

permissions:
  contents: write

# One-shot workflow: remove after the roadmap commit is created.
jobs:
  append-date:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Append update date
        shell: bash
        run: |
          set -euo pipefail
          file="ANA_EKRAN_DASHBOARD_GLOBAL_ARAMA_KLASOR_SAYFALARI_ROADMAP.md"
          marker="> **Son güncelleme tarihi:** 2026-07-17"
          if ! grep -Fqx "$marker" "$file"; then
            printf '\n---\n\n%s\n' "$marker" >> "$file"
          fi

      - name: Commit and push
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- ANA_EKRAN_DASHBOARD_GLOBAL_ARAMA_KLASOR_SAYFALARI_ROADMAP.md; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ANA_EKRAN_DASHBOARD_GLOBAL_ARAMA_KLASOR_SAYFALARI_ROADMAP.md
          git commit -m "docs: add roadmap last update date"
          git pull --rebase origin main
          git push origin HEAD:main
