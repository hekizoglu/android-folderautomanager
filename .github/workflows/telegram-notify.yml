name: Telegram Bildirim

on:
  push:
    branches: [main]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Commit bilgisini al
        id: info
        run: |
          HASH=$(git rev-parse --short HEAD)
          MSG=$(git log -1 --pretty=%s)
          FILES=$(git diff-tree --no-commit-id -r --name-only HEAD | head -8 | tr '\n' ', ' | sed 's/,$//')
          AUTHOR=$(git log -1 --pretty=%an)
          DATE=$(date '+%Y-%m-%d %H:%M')
          echo "hash=$HASH" >> $GITHUB_OUTPUT
          echo "msg=$MSG" >> $GITHUB_OUTPUT
          echo "files=$FILES" >> $GITHUB_OUTPUT
          echo "author=$AUTHOR" >> $GITHUB_OUTPUT
          echo "date=$DATE" >> $GITHUB_OUTPUT

      - name: Telegram'a gönder
        env:
          TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          TEXT="🚀 *AppOrganizer Push*
          
📦 \`${{ steps.info.outputs.hash }}\` — ${{ steps.info.outputs.msg }}
👤 ${{ steps.info.outputs.author }}
🕐 ${{ steps.info.outputs.date }}
📁 ${{ steps.info.outputs.files }}"
          
          curl -s -X POST "https://api.telegram.org/bot${TOKEN}/sendMessage" \
            -d chat_id="${CHAT_ID}" \
            -d parse_mode="Markdown" \
            --data-urlencode "text=${TEXT}" | grep -o '"ok":[a-z]*'
