name: Telegram Bildirim

on:
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Commit bilgisini al
        id: info
        run: |
          echo "hash=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "msg=$(git log -1 --pretty=%s)" >> $GITHUB_OUTPUT
          echo "files=$(git diff-tree --no-commit-id -r --name-only HEAD | head -8 | tr '\n' ',' | sed 's/,$//')" >> $GITHUB_OUTPUT
          echo "author=$(git log -1 --pretty=%an)" >> $GITHUB_OUTPUT
          echo "date=$(date '+%Y-%m-%d %H:%M')" >> $GITHUB_OUTPUT

      - name: Telegram - Push Bildirimi
        env:
          TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TOKEN}/sendMessage" \
            -d chat_id="${CHAT_ID}" \
            -d parse_mode="HTML" \
            --data-urlencode "text=AppOrganizer Push&#10;&#10;Commit: ${{ steps.info.outputs.hash }}&#10;${{ steps.info.outputs.msg }}&#10;&#10;Dosyalar: ${{ steps.info.outputs.files }}&#10;Tarih: ${{ steps.info.outputs.date }}"

      - name: Telegram - Dongu Onay Istegi
        env:
          TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -s -X POST "https://api.telegram.org/bot${TOKEN}/sendMessage" \
            -d chat_id="${CHAT_ID}" \
            -d parse_mode="HTML" \
            --data-urlencode "text=Dongu Onayi Bekleniyor&#10;&#10;Commit: ${{ steps.info.outputs.hash }}&#10;Degisen: ${{ steps.info.outputs.files }}&#10;&#10;Build: ${RUN_URL}&#10;&#10;Yanitla:&#10;ONAYLA - sonraki donguye gec&#10;IPTAL ET - degisiklikleri geri al&#10;DUZENLE - ne degismesini istedigini yaz"
