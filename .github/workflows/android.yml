name: Firebase Device Test APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Create google-services.json
        shell: bash
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          raw = os.environ.get("GOOGLE_SERVICES_JSON", "").strip()

          if not raw:
              raise SystemExit(
                  "GOOGLE_SERVICES_JSON secret bulunamadi veya bos. "
                  "Firebase test APK'si uretilemez."
              )

          try:
              data = json.loads(raw)
          except json.JSONDecodeError as exc:
              raise SystemExit(
                  f"GOOGLE_SERVICES_JSON gecerli JSON degil: {exc}"
              )

          clients = data.get("client", [])
          package_names = []

          for client in clients:
              android_info = (
                  client.get("client_info", {})
                  .get("android_client_info", {})
              )
              package_name = android_info.get("package_name")
              if package_name:
                  package_names.append(package_name)

          expected_package = "com.armutlu.apporganizer"

          if expected_package not in package_names:
              raise SystemExit(
                  "google-services.json icinde beklenen Android paket adi bulunamadi. "
                  f"Beklenen: {expected_package}, bulunanlar: {package_names}"
              )

          destination = Path("app/google-services.json")
          destination.write_text(
              json.dumps(data, ensure_ascii=False, indent=2),
              encoding="utf-8"
          )

          print("google-services.json olusturuldu ve paket adi dogrulandi.")
          PY

      - name: Make Gradle executable
        run: chmod +x gradlew

      - name: Clean
        run: ./gradlew clean --console=plain

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest --console=plain

      - name: Build Firebase-enabled debug APK
        run: ./gradlew assembleDebug --console=plain

      - name: Verify APK exists
        shell: bash
        run: |
          test -f app/build/outputs/apk/debug/app-debug.apk || {
            echo "app/build/outputs/apk/debug/app-debug.apk bulunamadi"
            exit 1
          }

      - name: Upload Firebase-enabled APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-FIREBASE-ENABLED
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14
