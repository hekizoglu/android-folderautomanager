# AppOrganizer code CI: Firebase secret olmadan derleme ve unit test dogrulama.
# Bu hat telefon testi icin APK yayinlamaz.
name: Android Code CI — No Firebase

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Check duplicate categories
        run: python scripts/check_duplicates.py assets/app_categories.json

      - name: Make Gradle executable
        run: chmod +x gradlew

      - name: CI verification APK - no Firebase - do not use for device testing
        run: ./gradlew assembleDebug testDebugUnitTest -PskipGoogleServices=true --console=plain

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: app/build/reports/tests/
          retention-days: 7
