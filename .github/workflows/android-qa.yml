name: Android QA — No Firebase

on:
  workflow_dispatch:

jobs:
  qa:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Build debug - no Firebase
        run: ./gradlew assembleDebug -PskipGoogleServices=true --console=plain

      - name: Lint - no Firebase
        run: ./gradlew lintDebug -PskipGoogleServices=true --console=plain

      - name: Unit tests - no Firebase
        run: ./gradlew testDebugUnitTest -PskipGoogleServices=true --console=plain

      - name: detekt - no Firebase
        run: ./gradlew detekt -PskipGoogleServices=true --console=plain
        continue-on-error: true

      - name: ktlint - no Firebase
        run: ./gradlew ktlintCheck -PskipGoogleServices=true --console=plain
        continue-on-error: true

      - name: Upload QA reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-reports
          path: |
            **/build/reports/**
            **/build/test-results/**
