name: Android QA

on:
  workflow_dispatch:

jobs:
  qa:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Build (Debug)
        run: ./gradlew assembleDebug -PskipGoogleServices=true

      - name: Lint
        run: ./gradlew lintDebug -PskipGoogleServices=true

      - name: Unit Tests
        run: ./gradlew testDebugUnitTest -PskipGoogleServices=true

      - name: detekt
        run: ./gradlew detekt -PskipGoogleServices=true
        continue-on-error: true

      - name: ktlint
        run: ./gradlew ktlintCheck -PskipGoogleServices=true
        continue-on-error: true

      - name: Upload QA Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-reports
          path: |
            **/build/reports/**
            **/build/test-results/**
