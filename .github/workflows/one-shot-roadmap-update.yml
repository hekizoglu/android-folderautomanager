name: One-shot roadmap update

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/one-shot-roadmap-update.yml

permissions:
  contents: write

jobs:
  update-roadmap:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Append last update date
        shell: bash
        run: |
          set -euo pipefail
          file="ANA_EKRAN_DASHBOARD_GLOBAL_ARAMA_KLASOR_SAYFALARI_ROADMAP.md"
          marker="> **Son güncelleme tarihi:** 2026-07-17"
          if ! grep -Fqx "$marker" "$file"; then
            printf '\n---\n\n%s\n' "$marker" >> "$file"
          fi

      - name: Commit roadmap update
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- ANA_EKRAN_DASHBOARD_GLOBAL_ARAMA_KLASOR_SAYFALARI_ROADMAP.md; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ANA_EKRAN_DASHBOARD_GLOBAL_ARAMA_KLASOR_SAYFALARI_ROADMAP.md
          git commit -m "Roadmap son güncelleme tarihini ekle"
          git push origin HEAD:main
