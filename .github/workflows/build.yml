name: Build & Test

on:
  push:
    branches: [ main, 'claude/**' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  # ─── 1. Unit Testler ──────────────────────────────────────────────────────
  # Cihaz gerektirmez, hızlıdır. JVM üzerinde çalışır.
  # AppClassifier, Category, AppInfo gibi saf Kotlin/Java sınıflarını test eder.
  unit-test:
    name: Unit Tests + Coverage
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4.2.2

    - name: Set up JDK 17
      uses: actions/setup-java@v4.7.0
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Grant gradlew permission
      run: chmod +x gradlew

    - name: Run unit tests
      run: ./gradlew testDebugUnitTest --stacktrace

    # Jacoco: Kodun yüzde kaçı test tarafından çalıştırıldı?
    # HTML raporu → hangi satırlar test edilmemiş görsel gösterir
    # XML raporu → Codecov gibi araçlara yüklenebilir
    - name: Generate coverage report (Jacoco)
      run: ./gradlew jacocoTestReport

    - name: Upload unit test results
      if: always()
      uses: actions/upload-artifact@v4.6.2
      with:
        name: unit-test-results
        path: app/build/reports/tests/testDebugUnitTest/
        retention-days: 7

    - name: Upload coverage report
      if: always()
      uses: actions/upload-artifact@v4.6.2
      with:
        name: coverage-report
        path: app/build/reports/jacoco/jacocoTestReport/html/
        retention-days: 7

  # ─── 2. Instrumented Testler ──────────────────────────────────────────────
  # Gerçek Android ortamında (emülatörde) çalışır.
  # Room DB, Espresso UI, Compose UI testlerini kapsar.
  # Unit testlerden yavaştır çünkü emülatör başlatılır.
  instrumented-test:
    name: Instrumented Tests (Emulator)
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4.2.2

    - name: Set up JDK 17
      uses: actions/setup-java@v4.7.0
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Grant gradlew permission
      run: chmod +x gradlew

    # KVM: Emülatörü donanım hızlandırmayla çalıştırmak için gerekli
    - name: Enable KVM (hardware acceleration)
      run: |
        echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
        sudo udevadm control --reload-rules
        sudo udevadm trigger --name-match=kvm

    - name: Run instrumented tests on emulator
      uses: reactivecircus/android-emulator-runner@v2
      with:
        api-level: 29          # Android 10 — minSdk ile uyumlu
        target: default
        arch: x86_64
        profile: Nexus 6
        script: ./gradlew connectedDebugAndroidTest --stacktrace

    - name: Upload instrumented test results
      if: always()
      uses: actions/upload-artifact@v4.6.2
      with:
        name: instrumented-test-results
        path: app/build/reports/androidTests/connected/
        retention-days: 7

  # ─── 3. APK Build ─────────────────────────────────────────────────────────
  # Testler geçtikten sonra APK üretilir.
  # Debug APK: imzasız, geliştirici modunda test için kullanılır.
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest
    needs: unit-test   # Unit testler geçmeden build başlamaz

    steps:
    - uses: actions/checkout@v4.2.2

    - name: Set up JDK 17
      uses: actions/setup-java@v4.7.0
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Grant gradlew permission
      run: chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug --stacktrace

    # Artifact: Actions sekmesinden indirilebilir dosya
    - name: Upload Debug APK
      uses: actions/upload-artifact@v4.6.2
      with:
        name: AppOrganizer-debug
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 14
