name: Build & Test

on:
  push:
    branches: [ main, 'claude/**' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Grant gradlew permission
      run: chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug --stacktrace

    - name: Run unit tests
      run: ./gradlew testDebugUnitTest --stacktrace
      continue-on-error: true

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: AppOrganizer-debug-${{ github.sha }}
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 14

    - name: Upload unit test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: unit-test-results
        path: app/build/reports/tests/testDebugUnitTest/
        retention-days: 7
        if-no-files-found: warn

    - name: Telegram Build Basarili + APK
      if: success() && github.ref == 'refs/heads/main'
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        COMMIT_MSG=$(git log -1 --pretty=format:"%s")
        COMMIT_SHA=$(git rev-parse --short HEAD)
        curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
          -d "chat_id=${TELEGRAM_CHAT_ID}" \
          -d "text=AppOrganizer Build Basarili%0A%0ACommit: ${COMMIT_SHA}%0AMesaj: ${COMMIT_MSG}%0ASaat: $(date '+%H:%M')" \
          -d "parse_mode=HTML"
        curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendDocument" \
          -F "chat_id=${TELEGRAM_CHAT_ID}" \
          -F "caption=AppOrganizer debug APK - ${COMMIT_SHA}" \
          -F "document=@app/build/outputs/apk/debug/app-debug.apk"

    - name: Telegram Build Basarisiz
      if: failure() && github.ref == 'refs/heads/main'
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        COMMIT_MSG=$(git log -1 --pretty=format:"%s")
        COMMIT_SHA=$(git rev-parse --short HEAD)
        RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
          -d "chat_id=${TELEGRAM_CHAT_ID}" \
          -d "text=AppOrganizer Build Basarisiz%0A%0ACommit: ${COMMIT_SHA}%0AMesaj: ${COMMIT_MSG}%0ALink: ${RUN_URL}" \
          -d "parse_mode=HTML"
