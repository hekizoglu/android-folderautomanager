name: Legacy Code Build - No Firebase

on:
  workflow_dispatch:

jobs:
  build:
    name: Build and test without Firebase
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Make Gradle executable
        run: chmod +x gradlew

      - name: Build debug - no Firebase
        run: ./gradlew assembleDebug -PskipGoogleServices=true --stacktrace --console=plain

      - name: Run unit tests - no Firebase
        run: ./gradlew testDebugUnitTest -PskipGoogleServices=true --stacktrace --console=plain

      - name: Upload unit test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: app/build/reports/tests/testDebugUnitTest/
          retention-days: 7
          if-no-files-found: warn

      - name: Telegram Build Basarili
        if: success() && github.ref == 'refs/heads/main'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          COMMIT_MSG=$(git log -1 --pretty=format:"%s")
          COMMIT_SHA=$(git rev-parse --short HEAD)
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=AppOrganizer Build Basarili%0A%0ACommit: ${COMMIT_SHA}%0AMesaj: ${COMMIT_MSG}%0ANot: Firebase icermeyen kod dogrulama build'i; telefon testi icin APK gonderilmedi.%0ASaat: $(date '+%H:%M')" \
            -d "parse_mode=HTML"

      - name: Telegram Build Basarisiz
        if: failure() && github.ref == 'refs/heads/main'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          COMMIT_MSG=$(git log -1 --pretty=format:"%s")
          COMMIT_SHA=$(git rev-parse --short HEAD)
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=AppOrganizer Build Basarisiz%0A%0ACommit: ${COMMIT_SHA}%0AMesaj: ${COMMIT_MSG}%0ALink: ${RUN_URL}" \
            -d "parse_mode=HTML"
